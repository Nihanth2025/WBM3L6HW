<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>

    <style>
        body {
            position: relative;
        }

        p {
            font-size: 18px;
        }
        
        #myself{
           padding-top: 50px;
           height: 500px;
           color: white;
           background-color: rgb(65, 22, 221);
        }
        #hobbies {
            padding-top: 50px;
            height: 500px;
            color: white;
            background-color: orange;
        }


    </style>
</head>

<body data-spy="scroll" data-target=".navbar" data-offset="50">
    <nav class="navbar navbar-inverse navbar-fixed -top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNAvbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">Codingal</a>
            </div>

            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav">
                    <li><a href="#myself">Myself</a></li>
                    <li><a href="#hobbies">My hobbies</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div id="myself" class="container-fluid">
        <h1>Myself</h1>
        <h2>My name is Nihanth.</h2>
        <h3>Class: Garde-VII</h3>
        <h4>I am 12 years old</h4>

    </div>

    <div id="hobbies" class="container-fluid">
        <h1>My hobbies</h1>
        <h2>Playing</h2>
        <h2>Coding</h2>
        <h2>Reading books</h2>

        <div id="myCarousel" class="carousel slide" data-ride="carousel">

            <!-- Indicators -->

            <ol class="carousel-indicators">

                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>

                <li data-target="#myCarousel" data-slide-to="1"></li>

                <li data-target="#myCarousel" data-slide-to="2"></li>

            </ol>

            <!-- Wrapper for slides -->

            <div class="carousel-inner">

                <div class="item active">

                    <img src="image4.png" alt="Image 1">

                </div>

                <div class="item">

                    <img src="image5.png" alt="Image 2">

                </div>


                <div class="item">

                    <img src="image6.png" alt="Penguin">

                </div>

            </div>

            <!-- Left and right controls -->

            <a class="left carousel-control" href="" data-slide="prev">

                <span class="glyphicon glyphicon-chevron-left"></span>

                <span class="sr-only">Previous</span>

            </a>

            <a class="right carousel-control" href="#myCarousel" data-slide="next">

                <span class="glyphicon glyphicon-chevron-right"></span>

                <span class="sr-only">Next</span>
            </a>
    </div>


</body>

</html>
